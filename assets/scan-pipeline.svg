<svg viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg" width="800" height="160">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff9900"/>
    </marker>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="160" fill="#0d1117" rx="12"/>

  <!-- Boxes -->
  <rect x="20" y="55" width="120" height="50" rx="8" fill="#1a3a5a" stroke="#ff9900" stroke-width="1.5"/>
  <text x="80" y="76" text-anchor="middle" fill="#ff9900" font-family="monospace" font-size="11" font-weight="bold">AWS Account</text>
  <text x="80" y="92" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">Your cloud</text>

  <rect x="200" y="20" width="110" height="40" rx="8" fill="#1a2a4a" stroke="#4488ff" stroke-width="1.5"/>
  <text x="255" y="38" text-anchor="middle" fill="#4488ff" font-family="monospace" font-size="10">S3 Scanner</text>
  <text x="255" y="52" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">public buckets</text>

  <rect x="200" y="70" width="110" height="40" rx="8" fill="#1a2a4a" stroke="#4488ff" stroke-width="1.5"/>
  <text x="255" y="88" text-anchor="middle" fill="#4488ff" font-family="monospace" font-size="10">IAM Analyser</text>
  <text x="255" y="102" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">permissions</text>

  <rect x="200" y="120" width="110" height="30" rx="8" fill="#1a2a4a" stroke="#4488ff" stroke-width="1.5"/>
  <text x="255" y="140" text-anchor="middle" fill="#4488ff" font-family="monospace" font-size="10">SG + CloudTrail</text>

  <!-- Arrows from account -->
  <line x1="140" y1="70" x2="198" y2="40" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="80" x2="198" y2="90" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="90" x2="198" y2="130" stroke="#ff9900" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Findings box -->
  <rect x="375" y="55" width="120" height="50" rx="8" fill="#2a1a1a" stroke="#ff4444" stroke-width="1.5"/>
  <text x="435" y="76" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="11" font-weight="bold">Findings</text>
  <text x="435" y="92" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">scored and ranked</text>

  <line x1="312" y1="40" x2="373" y2="70" stroke="#4488ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="312" y1="90" x2="373" y2="83" stroke="#4488ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="312" y1="135" x2="373" y2="95" stroke="#4488ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Severity boxes -->
  <rect x="555" y="20" width="90" height="30" rx="6" fill="#2a0000" stroke="#ff0000" stroke-width="1.5">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="40" text-anchor="middle" fill="#ff4444" font-family="monospace" font-size="11" font-weight="bold">CRITICAL</text>

  <rect x="555" y="60" width="90" height="30" rx="6" fill="#2a1500" stroke="#ff6600" stroke-width="1.5"/>
  <text x="600" y="80" text-anchor="middle" fill="#ff8800" font-family="monospace" font-size="11" font-weight="bold">HIGH</text>

  <rect x="555" y="100" width="90" height="30" rx="6" fill="#2a2000" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="600" y="120" text-anchor="middle" fill="#ffcc00" font-family="monospace" font-size="11" font-weight="bold">MEDIUM</text>

  <line x1="497" y1="68" x2="553" y2="35" stroke="#ff4444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="497" y1="80" x2="553" y2="75" stroke="#ff8800" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="497" y1="92" x2="553" y2="115" stroke="#ffcc00" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Report box -->
  <rect x="660" y="55" width="120" height="50" rx="8" fill="#0a1a0a" stroke="#00ff41" stroke-width="1.5"/>
  <text x="720" y="76" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="11" font-weight="bold">Report</text>
  <text x="720" y="92" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">fix and close</text>

  <line x1="647" y1="60" x2="658" y2="68" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="647" y1="75" x2="658" y2="78" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="647" y1="90" x2="658" y2="88" stroke="#00ff41" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Animated scan line -->
  <line x1="20" y1="148" x2="20" y2="148" stroke="#ff9900" stroke-width="2" opacity="0.6">
    <animate attributeName="x2" values="20;780;780" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
  </line>
  <text x="400" y="158" text-anchor="middle" fill="#555" font-family="monospace" font-size="9">SCANNING...</text>
</svg>
